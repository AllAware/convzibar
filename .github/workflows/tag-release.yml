# =============================================================================
# Tag release — creates the annotated v<version> tag (and a GitHub release
# with the matching CHANGELOG section) for the version in package.json.
#
# Two triggers:
#   • push to main   — tags automatically, but only when the push actually
#     changes the version in package.json (compared against the first parent).
#     Pushes that don't bump the version are a fast no-op.
#   • workflow_dispatch — tags explicitly; the optional `ref` input tags a
#     specific commit retroactively (defaults to main's HEAD).
#
# Idempotent: a tag that already points at the target commit is a no-op.
# A tag that exists at a DIFFERENT commit fails the run — bump the version in
# package.json instead of moving published tags.
# =============================================================================
name: Tag release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA (or ref) to tag; defaults to main's HEAD
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Create tag for package.json version
        id: tag
        run: |
          set -euo pipefail
          VERSION="v$(node -p "require('./package.json').version")"
          TARGET="$(git rev-parse HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tagged=false" >> "$GITHUB_OUTPUT"

          # On plain pushes, only act when this push changed the version —
          # otherwise every merge to main would try to (re)tag.
          if [ "$GITHUB_EVENT_NAME" = "push" ] && git rev-parse -q --verify HEAD^ >/dev/null; then
            git show HEAD^:package.json > /tmp/prev-package.json
            PREV="v$(node -p "require('/tmp/prev-package.json').version")"
            if [ "$PREV" = "$VERSION" ]; then
              echo "Version unchanged ($VERSION) in this push — nothing to tag."
              exit 0
            fi
          fi

          if git rev-parse -q --verify "refs/tags/$VERSION^{commit}" >/dev/null; then
            EXISTING="$(git rev-parse "$VERSION^{commit}")"
            if [ "$EXISTING" = "$TARGET" ]; then
              echo "Tag $VERSION already points at $TARGET — nothing to do."
              echo "tagged=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Tag $VERSION already exists at $EXISTING (wanted $TARGET). Bump the version in package.json instead of retagging."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" "$TARGET" -m "$VERSION"
          git push origin "refs/tags/$VERSION"
          echo "Created tag $VERSION at $TARGET."
          echo "tagged=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release from CHANGELOG
        if: steps.tag.outputs.tagged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — nothing to do."
            exit 0
          fi
          # Extract this version's CHANGELOG section (heading to next '## ').
          awk -v ver="${VERSION#v}" '
            $0 == "## " ver { grab = 1; next }
            grab && /^## /  { exit }
            grab            { print }
          ' CHANGELOG.md > /tmp/notes.md
          if [ -s /tmp/notes.md ]; then
            gh release create "$VERSION" --title "$VERSION" --notes-file /tmp/notes.md
          else
            gh release create "$VERSION" --title "$VERSION" --generate-notes
          fi
